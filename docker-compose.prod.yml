version: '3.8'

services:
  # KELEDON Main Application (Production)
  keledon-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keledon-app-prod
    restart: unless-stopped
    ports:
      - "8080:8080"  # Cloud Run requirement
    environment:
      - NODE_ENV=production
      - PORT=3001  # Internal backend port
      - SINGLE_CONTAINER=true
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - keledon-prod
    depends_on:
      - qdrant
    volumes:
      - ./logs:/app/logs

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: keledon-qdrant-prod
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - keledon-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Redis for session caching and real-time coordination
  redis:
    image: redis:7-alpine
    container_name: keledon-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - keledon-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - redis_data:/data

  # PostgreSQL with pgvector for persistent data
  postgres:
    image: pgvector/pgvector:pg16
    container_name: keledon-postgres-prod
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=keledon_prod
      - POSTGRES_USER=keledon
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-keledon_secure_password}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./cloud/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - keledon-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keledon -d keledon_prod"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Nginx Reverse Proxy (Optional for multi-service deployment)
  nginx:
    image: nginx:alpine
    container_name: keledon-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - keledon-prod
    depends_on:
      - keledon-app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  keledon-prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16