# DEPRECATED: local auth bootstrap must use Supabase CLI (`npx supabase start`).
# This compose file remains for historical reference only and is not part of the supported flow.
services:
  supabase-db:
    image: supabase/postgres:15.14.1.081
    container_name: keledon-supabase-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    ports:
      - "54323:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  supabase-auth:
    image: supabase/gotrue:v2.177.0
    container_name: keledon-supabase-auth
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_SITE_URL: http://localhost:54321
      GOTRUE_URI_ALLOW_LIST: http://localhost:54321,http://localhost:3000,http://localhost:3014
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@supabase-db:5432/postgres
      GOTRUE_DB_NAMESPACE: public
      GOTRUE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-chars-long
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_OPERATOR_TOKEN: operator-token-dev-only
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@example.com
      GOTRUE_SMTP_HOST: mail
      GOTRUE_SMTP_PORT: 2500
      GOTRUE_SMTP_USER: fake
      GOTRUE_SMTP_PASS: fake
      GOTRUE_SMTP_SENDER_NAME: keledon-local
      GOTRUE_LOG_LEVEL: info
    ports:
      - "54321:9999"

  supabase-rest:
    image: postgrest/postgrest:v12.2.3
    container_name: keledon-supabase-rest
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:postgres@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,auth
      PGRST_DB_ANON_ROLE: postgres
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-chars-long
      PGRST_SERVER_PORT: 3000
    ports:
      - "54324:3000"

volumes:
  supabase_db_data:
