version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: keledon-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - keledon-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Optional: Redis for caching (if needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: keledon-redis-dev
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   networks:
  #     - keledon-dev
  #   command: redis-server --appendonly yes

  # Optional: PostgreSQL with pgvector extension
  # postgres:
  #   image: pgvector/pgvector:pg16
  #   container_name: keledon-postgres-dev
  #   restart: unless-stopped
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     - POSTGRES_DB=keledon_dev
  #     - POSTGRES_USER=keledon
  #     - POSTGRES_PASSWORD=keledon_dev_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - keledon-dev
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U keledon -d keledon_dev"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

volumes:
  qdrant_data:
    driver: local
  # redis_data:
  #   driver: local
  # postgres_data:
  #   driver: local

networks:
  keledon-dev:
    driver: bridge