# KELEDON Release CI/CD Pipeline
# Triggers on push to tags matching v*
# Builds Electron NSIS installer on Windows, gates on signing, publishes to GitHub Releases.
# Cloud (Railway) is deployed via deploy hook.
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build Electron installer on Windows
  # ─────────────────────────────────────────────────────────────────────────────
  build-browser:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: browser

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (TypeScript + electron-builder NSIS)
        run: npm run dist
        env:
          # Suppress electron-builder telemetry
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'

      - name: Find installer path
        id: find_installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in browser/dist/"; exit 1 }
          echo "path=browser/dist/$($exe.Name)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $($exe.FullName)"

      - name: Verify code signing
        # Soft-gate: warns if unsigned; set REQUIRE_SIGNING=true to block releases
        shell: pwsh
        run: |
          $exePath = "${{ steps.find_installer.outputs.path }}"
          $sig = Get-AuthenticodeSignature $exePath
          Write-Host "Signing status: $($sig.Status)"
          if ($sig.Status -ne "Valid") {
            if ("${{ vars.REQUIRE_SIGNING }}" -eq "true") {
              Write-Error "BLOCKED: Binary is unsigned. Set REQUIRE_SIGNING=false to allow unsigned releases."
              exit 1
            } else {
              Write-Host "WARNING: Binary is unsigned. Proceeding (REQUIRE_SIGNING != true)."
            }
          } else {
            Write-Host "SUCCESS: Binary is signed."
          }
        working-directory: ${{ github.workspace }}

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "keledon-${version}-win-x64.zip"
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "dist\$zipName"
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT
        id: create_zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            browser/dist/${{ steps.find_installer.outputs.name }}
            browser/dist/${{ steps.create_zip.outputs.zip_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Deploy Cloud (NestJS) to Railway
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-cloud:
    runs-on: ubuntu-latest
    needs: build-browser
    steps:
      - name: Deploy to Railway
        run: |
          echo "Deploying cloud to Railway for ${{ github.ref_name }}..."
          npm install -g @railway/cli
          railway redeploy --service keledon --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Update Landing page download URL
  # ─────────────────────────────────────────────────────────────────────────────
  update-landing:
    runs-on: ubuntu-latest
    needs: build-browser
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update download URL in landing page
        run: |
          VERSION="${{ github.ref_name }}"
          FILE="landing/src/pages/LaunchKeledonPage.tsx"
          # Replace the installer download URL to point at the new release asset
          sed -i \
            "s|/releases/download/v[0-9][0-9.]*[0-9]/KELEDON\.Browser\.Setup\.[0-9][0-9.]*[0-9]\.exe|/releases/download/${VERSION}/KELEDON.Browser.Setup.${VERSION#v}.exe|g" \
            "$FILE"
          echo "Updated $FILE to $VERSION"

      - name: Commit and push landing update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add landing/src/pages/LaunchKeledonPage.tsx
          if git diff --staged --quiet; then
            echo "No changes to landing page — already up to date"
          else
            git commit -m "chore(landing): update download URL to ${{ github.ref_name }}"
            git push origin HEAD:main
          fi
