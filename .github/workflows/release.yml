# KELEDON Release CI/CD Pipeline
# Triggers on push to tags matching v*
# Builds Electron NSIS installer on Windows, gates on signing, publishes to GitHub Releases.
# Cloud (Railway) is deployed via deploy hook.
name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build Electron installer on Windows
  # ─────────────────────────────────────────────────────────────────────────────
  build-browser:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: browser

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: browser/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app (TypeScript + electron-builder NSIS)
        run: npm run dist
        env:
          # Suppress electron-builder telemetry
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'

      - name: Find installer path
        id: find_installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -File | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in browser/dist/"; exit 1 }
          echo "path=browser/dist/$($exe.Name)" >> $env:GITHUB_OUTPUT
          echo "name=$($exe.Name)" >> $env:GITHUB_OUTPUT
          Write-Host "Installer: $($exe.FullName)"

      - name: Sign installer with Azure Trusted Signing
        # Activate by setting AZURE_SIGNING_ENABLED=true in repo Variables and
        # adding secrets: AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET,
        # AZURE_SIGNING_ENDPOINT, AZURE_SIGNING_ACCOUNT, AZURE_SIGNING_PROFILE
        if: vars.AZURE_SIGNING_ENABLED == 'true'
        uses: azure/trusted-signing-action@v0.3.20
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: browser/dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify code signing
        # Soft-gate: warns if unsigned; set REQUIRE_SIGNING=true to block releases
        shell: pwsh
        run: |
          $exePath = "${{ steps.find_installer.outputs.path }}"
          $sig = Get-AuthenticodeSignature $exePath
          Write-Host "Signing status: $($sig.Status)"
          if ($sig.Status -ne "Valid") {
            if ("${{ vars.REQUIRE_SIGNING }}" -eq "true") {
              Write-Error "BLOCKED: Binary is unsigned. Set REQUIRE_SIGNING=false to allow unsigned releases."
              exit 1
            } else {
              Write-Host "WARNING: Binary is unsigned. Proceeding (REQUIRE_SIGNING != true)."
            }
          } else {
            Write-Host "SUCCESS: Binary is signed."
          }
        working-directory: ${{ github.workspace }}

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $zipName = "keledon-${version}-win-x64.zip"
          Compress-Archive -Path "dist\win-unpacked\*" -DestinationPath "dist\$zipName"
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT
        id: create_zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            browser/dist/${{ steps.find_installer.outputs.name }}
            browser/dist/${{ steps.create_zip.outputs.zip_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Deploy Cloud (NestJS) to Railway
  # Note: Railway auto-deploys from main branch merges. This step calls the
  # deploy hook URL (if set) for an explicit release redeploy. Non-blocking.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-cloud:
    runs-on: ubuntu-latest
    needs: build-browser
    continue-on-error: true
    steps:
      - name: Deploy to Railway via deploy hook
        run: |
          echo "Deploying cloud to Railway for ${{ github.ref_name }}..."
          if [ -n "$RAILWAY_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK"
            echo "Deploy hook triggered."
          else
            echo "RAILWAY_DEPLOY_HOOK not set — Railway auto-deploys from main. Skipping."
          fi
        env:
          RAILWAY_DEPLOY_HOOK: ${{ secrets.RAILWAY_DEPLOY_HOOK }}

