<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>KELEDON Browser</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --primary: #00d4aa;
      --primary-dim: #00a88a;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --success: #238636;
      --warning: #9e6a03;
      --danger: #da3633;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Header */
    header {
      background: var(--bg-secondary);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--bg);
      font-size: 14px;
    }
    header h1 { 
      font-size: 15px; 
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    header .header-actions {
      display: flex;
      gap: 8px;
    }
    header .btn-icon {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }
    header .btn-icon:hover {
      background: var(--border);
      color: var(--text);
    }
    header .btn-icon.primary {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }
    header .btn-icon.primary:hover {
      background: var(--primary-dim);
    }

    /* Status Bar */
    .status-bar {
      background: var(--bg-secondary);
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 13px;
    }
    .status-bar .status-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-bar .status-label {
      color: var(--text-dim);
    }
    .status-bar .status-value {
      color: var(--text);
      font-weight: 500;
    }
    .status-bar .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-bar .connection-status.disconnected {
      background: var(--bg-tertiary);
      color: var(--text-dim);
    }
    .status-bar .connection-status.connecting {
      background: var(--warning);
      background: rgba(158, 106, 3, 0.2);
      color: #d29922;
    }
    .status-bar .connection-status.connected {
      background: var(--success);
      background: rgba(35, 134, 54, 0.2);
      color: #3fb950;
    }
    .status-bar .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Quick Actions */
    .quick-actions {
      background: var(--bg);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    .quick-actions .btn-action {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .quick-actions .btn-action:hover:not(:disabled) {
      background: var(--bg-tertiary);
      border-color: var(--text-dim);
    }
    .quick-actions .btn-action:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .quick-actions .btn-action.record {
      background: var(--danger);
      border-color: var(--danger);
    }
    .quick-actions .btn-action.record:hover:not(:disabled) {
      background: #b93a37;
      border-color: #b93a37;
    }
    .quick-actions .btn-action.end {
      background: var(--bg-tertiary);
      border-color: var(--danger);
      color: var(--danger);
    }
    .quick-actions .btn-action.end:hover:not(:disabled) {
      background: var(--danger);
      color: white;
    }
    .quick-actions .btn-action.active {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* Tab Bar */
    .tab-bar {
      background: var(--bg-secondary);
      padding: 0 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 2px;
      height: 36px;
      overflow-x: auto;
    }
    .tab-bar::-webkit-scrollbar { height: 4px; }
    .tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      min-width: 80px;
      max-width: 160px;
    }
    .tab:hover { background: var(--border); color: var(--text); }
    .tab.active { background: var(--bg); color: var(--text); border-bottom-color: var(--bg); }
    .tab-icon { font-size: 11px; }
    .tab-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tab-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0 2px;
      font-size: 14px;
      line-height: 1;
    }
    .tab-close:hover { color: var(--danger); }
    .tab-add {
      background: none;
      border: 1px dashed var(--border);
      color: var(--text-dim);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    .tab-add:hover { border-color: var(--primary); color: var(--primary); }

    /* Escalation Modal */
    .escalation-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .escalation-modal.show { display: flex; }
    .escalation-content {
      background: var(--bg-secondary);
      border: 2px solid var(--danger);
      border-radius: 12px;
      padding: 24px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 0 30px rgba(218, 54, 51, 0.3);
    }
    .escalation-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .escalation-icon { font-size: 32px; }
    .escalation-title { font-size: 18px; font-weight: 600; color: var(--danger); }
    .escalation-type {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .escalation-type.trigger { background: var(--warning); color: var(--bg); }
    .escalation-type.failure { background: var(--danger); color: white; }
    .escalation-message { color: var(--text); font-size: 14px; margin-bottom: 12px; line-height: 1.5; }
    .escalation-detail {
      background: var(--bg-tertiary);
      padding: 10px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }
    .escalation-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .escalation-btn {
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .escalation-btn.continue {
      background: var(--primary);
      border: none;
      color: var(--bg);
    }
    .escalation-btn.continue:hover { background: var(--primary-dim); }
    .escalation-btn.fix {
      background: transparent;
      border: 1px solid var(--warning);
      color: var(--warning);
    }
    .escalation-btn.fix:hover { background: var(--warning); color: var(--bg); }
    .escalation-btn.abort {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .escalation-btn.abort:hover { border-color: var(--danger); color: var(--danger); }

    /* Panels Row */
    .panels-row {
      flex: 1;
      display: flex;
      gap: 1px;
      background: var(--border);
      overflow: hidden;
    }
    .panel {
      flex: 1;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 10px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    /* Activity Log Entry */
    .activity-entry {
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      border-left: 3px solid var(--border);
    }
    .activity-entry.info { border-left-color: var(--text-dim); }
    .activity-entry.success { border-left-color: var(--success); }
    .activity-entry.error { border-left-color: var(--danger); }
    .activity-entry .time { 
      color: var(--text-dim); 
      font-size: 11px;
      margin-bottom: 4px;
    }
    .activity-entry .msg { color: var(--text); }

    /* Transcript Entry */
    .transcript-entry {
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .transcript-entry .meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .transcript-entry .speaker {
      font-weight: 600;
      font-size: 12px;
    }
    .transcript-entry.agent .speaker { color: var(--primary); }
    .transcript-entry.customer .speaker { color: #58a6ff; }
    .transcript-entry .time { color: var(--text-dim); font-size: 11px; }
    .transcript-entry .text { color: var(--text); font-size: 13px; line-height: 1.5; }
    .transcript-entry .confidence { 
      font-size: 10px; 
      color: var(--text-dim); 
      margin-top: 4px; 
    }

    /* Command Entry */
    .command-entry {
      padding: 10px 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      border-left: 3px solid var(--primary);
    }
    .command-entry .meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .command-entry .time { color: var(--text-dim); font-size: 11px; }
    .command-entry .type { 
      background: var(--primary);
      color: var(--bg);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
    }
    .command-entry .payload { 
      color: var(--text-dim); 
      font-family: monospace;
      font-size: 11px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .command-entry .flow-id { 
      color: var(--text-dim); 
      font-size: 10px; 
      margin-top: 4px; 
    }

    /* Bottom Panels */
    .bottom-row {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
      height: 160px;
    }
    .bottom-panel {
      flex: 1;
      background: var(--bg);
      display: flex;
      flex-direction: column;
    }
    .bottom-panel-header {
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
    }
    .bottom-panel-content {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    /* Input styling */
    .input-group {
      margin-bottom: 10px;
    }
    .input-group label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-group input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
    }
    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .input-group input::placeholder {
      color: var(--text-dim);
    }

    .btn-connect {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      color: var(--bg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-connect:hover:not(:disabled) {
      background: var(--primary-dim);
    }
    .btn-connect:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Execute panel */
    .execute-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      margin-bottom: 10px;
    }
    .execute-input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .btn-execute {
      width: 100%;
      padding: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--primary);
      border-radius: 6px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-execute:hover:not(:disabled) {
      background: var(--primary);
      color: var(--bg);
    }
    .btn-execute:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Debug toggle */
    .debug-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
    }
    .debug-toggle:hover { background: var(--bg-tertiary); }
    .debug-toggle.active { 
      border-color: var(--primary); 
      color: var(--primary); 
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">K</div>
      <h1>KELEDON Browser</h1>
      <button id="versionBtn" class="btn-icon">v?.?.?</button>
    </div>
    <div class="header-actions">
      <button id="copyLogsBtn" class="btn-icon">Copy Logs</button>
    </div>
  </header>

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">Device:</span>
      <span class="status-value" id="deviceId">Loading...</span>
    </div>
    <div class="status-item">
      <span class="status-label">Session:</span>
      <span class="status-value" id="sessionId">-</span>
    </div>
    <div class="status-item">
      <span class="status-label">Keledon:</span>
      <span class="status-value" id="keledonStatus">Not linked</span>
    </div>
    <div class="connection-status disconnected" id="connectionStatus">
      <span class="status-dot"></span>
      <span>Disconnected</span>
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="quick-actions">
    <button id="startCallBtn" class="btn-action primary" disabled>📞 Start Call</button>
    <button id="muteBtn" class="btn-action" disabled>🔇 Mute</button>
    <button id="holdBtn" class="btn-action" disabled>⏸ Hold</button>
    <button id="hangupBtn" class="btn-action end" disabled>📵 End</button>
    <button id="callStatusBadge" class="btn-action" disabled>Idle</button>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <div class="tab active" data-tab-id="home">
      <span class="tab-icon">🏠</span>
      <span class="tab-name">Home</span>
      <button class="tab-close" data-close="home">×</button>
    </div>
    <button class="tab-add" id="tabAddBtn" title="New Tab">+</button>
  </div>

  <!-- Main Panels -->
  <div class="panels-row">
    <!-- Activity Panel -->
    <div class="panel" style="flex: 0.6;">
      <div class="panel-header">
        Activity
        <button id="clearLog" class="debug-toggle">Clear</button>
      </div>
      <div id="activityLog" class="panel-content"></div>
    </div>
    
    <!-- Transcript Panel -->
    <div class="panel">
      <div class="panel-header">Transcript</div>
      <div id="transcript" class="panel-content"></div>
    </div>
    
    <!-- Brain Status Panel -->
    <div class="panel">
      <div class="panel-header">
        Brain
        <button id="debugToggle" class="debug-toggle">Debug</button>
      </div>
      <div id="brainStatus" class="panel-content"></div>
    </div>
  </div>

  <!-- Bottom Panels -->
  <div class="bottom-row">
    <!-- Connect Panel -->
    <div class="bottom-panel" style="flex: 0.6;">
      <div class="bottom-panel-header">Connect</div>
      <div class="bottom-panel-content">
        <div class="input-group">
          <label>Cloud URL</label>
          <input type="text" id="cloudUrl" value="https://keledon.tuyoisaza.com" placeholder="https://...">
        </div>
        <div class="input-group">
          <label>Pairing Code</label>
          <input type="text" id="pairingCode" placeholder="XXXX-XXXX">
        </div>
        <div class="input-group">
          <label>Keledon ID</label>
          <input type="text" id="keledonId" placeholder="keledon-xxx">
        </div>
        <button id="connectBtn" class="btn-connect">Connect</button>
      </div>
    </div>

    <!-- Execute Panel -->
    <div class="bottom-panel">
      <div class="bottom-panel-header">Execute</div>
      <div class="bottom-panel-content">
        <input type="text" id="goalInput" class="execute-input" placeholder="Enter goal...">
        <button id="executeBtn" class="btn-execute" disabled>▶ Execute</button>
      </div>
    </div>
  </div>

  <script>
    // Elements
    const deviceIdEl = document.getElementById('deviceId');
    const sessionIdEl = document.getElementById('sessionId');
    const keledonStatusEl = document.getElementById('keledonStatus');
    const connectionStatusEl = document.getElementById('connectionStatus');
    const transcriptEl = document.getElementById('transcript');
    const brainStatusEl = document.getElementById('brainStatus');
    const activityLogEl = document.getElementById('activityLog');
    const muteBtn = document.getElementById('muteBtn');
    const holdBtn = document.getElementById('holdBtn');
    const hangupBtn = document.getElementById('hangupBtn');
    const startCallBtn = document.getElementById('startCallBtn');
    const callStatusBadge = document.getElementById('callStatusBadge');
    const debugToggle = document.getElementById('debugToggle');
    const clearLogBtn = document.getElementById('clearLog');
    const cloudUrlInput = document.getElementById('cloudUrl');
    const pairingCodeInput = document.getElementById('pairingCode');
    const keledonIdInput = document.getElementById('keledonId');
    const connectBtn = document.getElementById('connectBtn');
    const goalInput = document.getElementById('goalInput');
    const executeBtn = document.getElementById('executeBtn');
    const versionBtn = document.getElementById('versionBtn');
    const copyLogsBtn = document.getElementById('copyLogsBtn');

    let isMuted = false;
    let isOnHold = false;
    let debugEnabled = false;
    let isConnected = false;

    // Logging
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = `activity-entry ${type}`;
      entry.innerHTML = `
        <div class="time">${new Date().toLocaleTimeString()}</div>
        <div class="msg">${message}</div>
      `;
      activityLogEl.appendChild(entry);
      activityLogEl.scrollTop = activityLogEl.scrollHeight;
      console.log(`[${type.toUpperCase()}] ${message}`);
    }

    // Connection status
    function setConnectionStatus(status) {
      connectionStatusEl.className = `connection-status ${status}`;
      const labels = { disconnected: 'Disconnected', connecting: 'Connecting...', connected: 'Connected' };
      connectionStatusEl.querySelector('span:last-child').textContent = labels[status] || status;
    }

    // Load device info
    async function loadDeviceInfo() {
      try {
        const info = await window.keledon.device.getInfo();
        deviceIdEl.textContent = info.deviceId;
        versionBtn.textContent = 'v' + info.version;
        log('Device initialized: ' + info.deviceId, 'info');
      } catch (e) {
        deviceIdEl.textContent = 'Error';
        log('Device info error: ' + e.message, 'error');
      }
    }

    // Auto-connect handler
    window.keledon.launcher.onLaunch((data) => {
      log('Launch data received', 'info');
      keledonStatusEl.textContent = 'Pending: ' + data.keledonId;
      
      if (data.action === 'auto-connect' && data.keledonId && data.code) {
        cloudUrlInput.value = data.cloudUrl || 'https://keledon.tuyoisaza.com';
        pairingCodeInput.value = data.code;
        keledonIdInput.value = data.keledonId;
        setConnectionStatus('connecting');
        log('Auto-connecting to ' + data.keledonId + '...', 'info');
        setTimeout(() => connectBtn.click(), 300);
      } else if (data.action === 'test') {
        log('Test mode: ' + (data.instructions || 'No instructions'), 'info');
      }
    });

    // Connect
    connectBtn.addEventListener('click', async () => {
      const cloudUrl = cloudUrlInput.value.trim();
      const pairingCode = pairingCodeInput.value.trim();
      const keledonId = keledonIdInput.value.trim();
      if (!cloudUrl || !pairingCode) {
        log('Cloud URL and pairing code required', 'error');
        return;
      }
      setConnectionStatus('connecting');
      log('Connecting to ' + cloudUrl + '...', 'info');
      try {
        const result = await window.keledon.runtime.connect({ 
          cloudUrl, token: pairingCode, keledonId: keledonId || null
        });
        if (result.success) {
          isConnected = true;
          setConnectionStatus('connected');
          keledonStatusEl.textContent = keledonId || 'Linked';
          executeBtn.disabled = false;
          log('Connected to ' + (keledonId || 'cloud'), 'success');
        } else {
          setConnectionStatus('disconnected');
          log('Connection failed: ' + result.error, 'error');
        }
      } catch (e) {
        setConnectionStatus('disconnected');
        log('Connection error: ' + e.message, 'error');
      }
    });

    // Execute
    executeBtn.addEventListener('click', async () => {
      const goal = goalInput.value.trim();
      if (!goal) {
        log('Goal required', 'error');
        return;
      }
      try {
        const result = await window.keledon.executor.executeGoal(goal, {});
        log('Executed: ' + goal.substring(0, 50), 'success');
        goalInput.value = '';
      } catch (e) {
        log('Execution error: ' + e.message, 'error');
      }
    });

    // Runtime events
    window.keledon.runtime.onConnect(({ sessionId }) => {
      sessionIdEl.textContent = sessionId || '-';
      startCallBtn.disabled = false;
      callStatusBadge.textContent = 'Ready';
      callStatusBadge.classList.remove('active');
      log('Connected to cloud, ready for calls', 'success');
    });

    // Start Call
    startCallBtn.addEventListener('click', async () => {
      if (startCallBtn.classList.contains('active')) {
        // End call
        try {
          await window.keledon.media.stopCall();
          startCallBtn.classList.remove('active');
          startCallBtn.textContent = '📞 Start Call';
          callStatusBadge.textContent = 'Idle';
          muteBtn.disabled = true;
          holdBtn.disabled = true;
          hangupBtn.disabled = true;
          log('Call ended', 'info');
        } catch (e) {
          log('End call error: ' + e.message, 'error');
        }
      } else {
        // Start call
        try {
          await window.keledon.media.startCall();
          startCallBtn.classList.add('active');
          startCallBtn.textContent = '📵 End Call';
          callStatusBadge.textContent = 'Active';
          muteBtn.disabled = false;
          holdBtn.disabled = false;
          hangupBtn.disabled = false;
          log('Call started', 'success');
        } catch (e) {
          log('Start call error: ' + e.message, 'error');
        }
      }
    });

    // Transcript
    window.keledon.media.onTranscript((entry) => {
      const div = document.createElement('div');
      div.className = `transcript-entry ${entry.speaker || 'customer'}`;
      div.innerHTML = `
        <div class="meta">
          <span class="speaker">${entry.speaker === 'agent' ? 'Agent' : 'Customer'}</span>
          <span class="time">${entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString()}</span>
        </div>
        <div class="text">${entry.text}</div>
      `;
      transcriptEl.appendChild(div);
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
    });

    // Brain commands - handle TTS from cloud
    window.keledon.brain.onCommand((cmd) => {
      // Handle say command from cloud (TTS)
      if (cmd.type === 'say' || (cmd.data && cmd.data.say)) {
        const text = cmd.data.say?.text || cmd.data.text;
        if (text) {
          window.keledon.media.speak(text, cmd.data.say?.interruptible ?? true).catch(e => {
            log('TTS error: ' + e.message, 'error');
          });
        }
      }

      const div = document.createElement('div');
      div.className = 'command-entry';
      div.innerHTML = `
        <div class="meta">
          <span class="time">${cmd.timestamp ? new Date(cmd.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString()}</span>
          <span class="type">${cmd.type || 'command'}</span>
        </div>
        <div class="payload">${JSON.stringify(cmd.payload || cmd.data || {})}</div>
        ${cmd.flow_id ? `<div class="flow-id">flow_id: ${cmd.flow_id}</div>` : ''}
      `;
      brainStatusEl.appendChild(div);
      brainStatusEl.scrollTop = brainStatusEl.scrollHeight;
    });

    // Mute
    muteBtn.addEventListener('click', async () => {
      isMuted = !isMuted;
      try {
        await (isMuted ? window.keledon.media.mute() : window.keledon.media.unmute());
        muteBtn.classList.toggle('active', isMuted);
        muteBtn.textContent = isMuted ? '🔊 Unmute' : '🔇 Mute';
      } catch (e) {
        log('Mute error: ' + e.message, 'error');
      }
    });

    // Hold
    holdBtn.addEventListener('click', async () => {
      isOnHold = !isOnHold;
      try {
        await (isOnHold ? window.keledon.media.hold() : window.keledon.media.resume());
        holdBtn.classList.toggle('active', isOnHold);
        holdBtn.textContent = isOnHold ? '▶ Resume' : '⏸ Hold';
      } catch (e) {
        log('Hold error: ' + e.message, 'error');
      }
    });

    // Hangup
    hangupBtn.addEventListener('click', async () => {
      try {
        await window.keledon.media.hangup();
        sessionIdEl.textContent = '-';
        callStatusBadge.textContent = 'Idle';
        callStatusBadge.classList.remove('active');
        muteBtn.disabled = true;
        holdBtn.disabled = true;
        hangupBtn.disabled = true;
        muteBtn.classList.remove('active');
        holdBtn.classList.remove('active');
        muteBtn.textContent = '🔇 Mute';
        holdBtn.textContent = '⏸ Hold';
        log('Call ended', 'info');
      } catch (e) {
        log('Hangup error: ' + e.message, 'error');
      }
    });

    // Debug toggle
    debugToggle.addEventListener('click', () => {
      debugEnabled = !debugEnabled;
      debugToggle.classList.toggle('active', debugEnabled);
      debugToggle.textContent = debugEnabled ? 'Debug: ON' : 'Debug';
      window.keledon.brain.setDebugMode(debugEnabled);
    });

    // Clear log
    clearLogBtn.addEventListener('click', () => {
      activityLogEl.innerHTML = '';
      log('Log cleared', 'info');
    });

    // Version button
    versionBtn.addEventListener('click', async () => {
      const info = await window.keledon.device.getInfo();
      navigator.clipboard.writeText('Keledon Browser v' + info.version);
      versionBtn.textContent = 'Copied!';
      setTimeout(() => versionBtn.textContent = 'v' + info.version, 1000);
    });

    // Copy logs
    copyLogsBtn.addEventListener('click', async () => {
      try {
        const logs = await window.keledon.evidence.getLogs();
        navigator.clipboard.writeText(logs.logs || 'No logs');
        copyLogsBtn.textContent = 'Copied!';
        setTimeout(() => copyLogsBtn.textContent = 'Copy Logs', 1000);
      } catch (e) {
        copyLogsBtn.textContent = 'Error';
        setTimeout(() => copyLogsBtn.textContent = 'Copy Logs', 1000);
      }
    });

    // ========== TAB BAR ==========
    const tabBar = document.getElementById('tabBar');
    const tabAddBtn = document.getElementById('tabAddBtn');
    let tabs = [];
    let activeTabId = 'home';

    async function loadTabs() {
      try {
        tabs = await window.keledon.tabs.list();
        renderTabs();
      } catch (e) {
        console.error('Failed to load tabs:', e);
      }
    }

    function renderTabs() {
      const homeTab = tabBar.querySelector('.tab[data-tab-id="home"]');
      const existingTabs = tabBar.querySelectorAll('.tab:not([data-tab-id="home"])');
      existingTabs.forEach(t => t.remove());
      
      tabs.forEach(tab => {
        const tabEl = document.createElement('div');
        tabEl.className = `tab ${tab.active ? 'active' : ''}`;
        tabEl.dataset.tabId = tab.id;
        tabEl.innerHTML = `
          <span class="tab-icon">📄</span>
          <span class="tab-name">${tab.name}</span>
          <button class="tab-close" data-close="${tab.id}">×</button>
        `;
        tabEl.addEventListener('click', (e) => {
          if (!e.target.classList.contains('tab-close')) {
            switchTab(tab.id);
          }
        });
        tabBar.insertBefore(tabEl, tabAddBtn);
      });
    }

    async function switchTab(tabId) {
      try {
        await window.keledon.tabs.switch(tabId);
        activeTabId = tabId;
        renderTabs();
      } catch (e) {
        console.error('Failed to switch tab:', e);
      }
    }

    async function closeTab(tabId) {
      try {
        await window.keledon.tabs.close(tabId);
        loadTabs();
      } catch (e) {
        console.error('Failed to close tab:', e);
      }
    }

    tabAddBtn.addEventListener('click', () => {
      const url = prompt('Enter URL:');
      if (url) {
        window.keledon.tabs.create('New Tab', url).then(() => loadTabs());
      }
    });

    tabBar.addEventListener('click', (e) => {
      if (e.target.classList.contains('tab-close')) {
        const tabId = e.target.dataset.close;
        closeTab(tabId);
      }
    });

    // Listen for tab updates from main process
    window.keledon.tabs.onUpdate((newTabs) => {
      tabs = newTabs;
      renderTabs();
    });

    // ========== ESCALATION MODAL ==========
    const escalationModal = document.createElement('div');
    escalationModal.className = 'escalation-modal';
    escalationModal.innerHTML = `
      <div class="escalation-content">
        <div class="escalation-header">
          <span class="escalation-icon">⚠️</span>
          <span class="escalation-title">Human Assistance Required</span>
          <span class="escalation-type" id="escalationType">trigger</span>
        </div>
        <div class="escalation-message" id="escalationMessage"></div>
        <div class="escalation-detail" id="escalationDetail"></div>
        <div class="escalation-buttons">
          <button class="escalation-btn abort" id="escalationAbort">Abort</button>
          <button class="escalation-btn fix" id="escalationFix">Fix</button>
          <button class="escalation-btn continue" id="escalationContinue">Continue</button>
        </div>
      </div>
    `;
    document.body.appendChild(escalationModal);

    const escalationTypeEl = document.getElementById('escalationType');
    const escalationMessageEl = document.getElementById('escalationMessage');
    const escalationDetailEl = document.getElementById('escalationDetail');
    const escalationContinueBtn = document.getElementById('escalationContinue');
    const escalationFixBtn = document.getElementById('escalationFix');
    const escalationAbortBtn = document.getElementById('escalationAbort');

    function showEscalationModal(type, data) {
      escalationTypeEl.className = `escalation-type ${type}`;
      escalationTypeEl.textContent = type === 'trigger' ? '⚠️ ESCALATION TRIGGER' : '❌ RPA FAILURE';
      
      if (type === 'trigger') {
        escalationMessageEl.innerHTML = `<strong>Escalation keyword detected:</strong> "${data.triggerWord}"`;
        escalationDetailEl.textContent = `Customer said: "${data.message}"`;
      } else {
        escalationMessageEl.innerHTML = `<strong>RPA execution failed:</strong> ${data.message}`;
        escalationDetailEl.textContent = `Step: ${data.step || 'unknown'} | Retries: ${data.retryCount || 0}`;
      }
      
      escalationModal.classList.add('show');
      log('⚠️ Escalation: ' + type, 'error');
    }

    function hideEscalationModal() {
      escalationModal.classList.remove('show');
    }

    escalationContinueBtn.addEventListener('click', () => {
      hideEscalationModal();
      log('Escalation: Continue', 'info');
      // Emit continue action
      if (window.keledon.escalation) {
        window.keledon.escalation.onAction((action) => {});
      }
    });

    escalationFixBtn.addEventListener('click', () => {
      hideEscalationModal();
      log('Escalation: Fix mode', 'info');
    });

    escalationAbortBtn.addEventListener('click', () => {
      hideEscalationModal();
      log('Escalation: Aborted', 'error');
    });

    // Listen for escalation events from main process
    if (window.keledon.escalation) {
      window.keledon.escalation.onAction((action, data) => {
        console.log('Escalation action:', action, data);
      });
    }

    // Load tabs on init
    loadTabs();

    // Initialize
    loadDeviceInfo();
  </script>
</body>
</html>
