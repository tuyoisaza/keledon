<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELEDON Agent</title>
    <style>
        :root {
            --bg: #0f131a;
            --panel: #151c27;
            --panel-soft: #1b2432;
            --border: #2a374b;
            --text: #e6eef9;
            --muted: #94a3b8;
            --accent: #3bd3c6;
            --accent-strong: #1fb5aa;
            --danger: #f25c6c;
            --success: #38d39f;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 450px;
            height: 650px;
            margin: 0;
            font-family: "Space Grotesk", "DM Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header - Compact */
        .header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            background: var(--panel);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 14px;
        }

        .brand-info {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .brand-name {
            font-weight: 600;
            font-size: 14px;
        }

        .brand-stack {
            font-size: 9px;
            color: var(--muted);
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .header-controls {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .header-btn {
            width: 28px;
            height: 28px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Tab Navigation - Compact */
        .tab-nav {
            display: flex;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 4px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
            margin-bottom: 42px;
            /* Space for fixed LED bar */
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        /* Chat Tab */
        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .chat-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--accent);
            font-size: 12px;
            flex-shrink: 0;
        }

        .command-section {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }

        .command-input {
            flex: 1;
            padding: 8px 10px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 13px;
        }

        .command-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input-btn {
            padding: 8px 10px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
        }

        .input-btn:hover {
            background: var(--accent-strong);
        }

        .input-btn.voice {
            background: var(--danger);
        }

        .input-btn.voice.recording {
            animation: pulse 1s infinite;
        }

        .tab-select-row {
            display: flex;
            gap: 6px;
        }

        .tab-select {
            flex: 1;
            padding: 6px 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 11px;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
        }

        .message {
            padding: 8px 10px;
            border-radius: 6px;
            max-width: 85%;
            word-wrap: break-word;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .message.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }

        .message.assistant {
            background: var(--panel);
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .message-time {
            font-size: 9px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* Tools Tab */
        .tools-content {
            padding: 12px;
            background: var(--bg);
            flex: 1;
            overflow-y: auto;
        }

        .tool-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tool-chip {
            padding: 4px 8px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 10px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .tool-chip:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* LED Bar - Fixed Bottom */
        .led-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 8px 12px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 42px;
            z-index: 100;
        }

        .led-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: all 0.3s;
            cursor: help;
        }

        .led.green {
            background: var(--success);
            box-shadow: 0 0 6px var(--success);
        }

        .led.yellow {
            background: var(--warning);
            box-shadow: 0 0 6px var(--warning);
        }

        .led.red {
            background: var(--danger);
            box-shadow: 0 0 6px var(--danger);
        }

        .led.gray {
            background: var(--muted);
            opacity: 0.3;
        }

        .led-label {
            font-size: 8px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Settings Panels */
        .settings-scroll,
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .settings-group {
            margin-bottom: 16px;
        }

        .settings-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 12px;
        }

        .settings-input {
            width: 100%;
            padding: 8px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            cursor: pointer;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(16px);
        }

        /* Log Panel */
        .log-panel {
            position: fixed;
            bottom: 42px;
            /* Above LED bar */
            left: 0;
            right: 0;
            height: 200px;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: none;
            flex-direction: column;
            z-index: 99;
        }

        .log-panel.open {
            display: flex;
        }

        .log-header {
            padding: 6px 12px;
            background: var(--panel);
            display: flex;
            justify-content: space-between;
            font-size: 10px;
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-family: monospace;
            font-size: 10px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="brand">
                <div class="logo">K</div>
                <div class="brand-info">
                    <div class="brand-name">KELEDON</div>
                    <div class="brand-stack">
                        <span id="versionLabel">v—</span>
                        <span style="margin: 0 4px; opacity: 0.5">|</span>
                        <span>Co: <span id="companyName">—</span></span>
                        <span style="margin: 0 4px; opacity: 0.5">|</span>
                        <span>Br: <span id="brandName">—</span></span>
                        <span style="margin: 0 4px; opacity: 0.5">|</span>
                        <span>Tm: <span id="teamName">—</span></span>
                    </div>
                </div>
            </div>
            <div class="header-controls">
                <button class="header-btn" id="logToggleBtn" title="Logs">📋</button>
                <button class="header-btn" id="settingsBtn" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="chat">Chat</button>
            <button class="tab-btn" data-tab="history">History</button>
            <button class="tab-btn" data-tab="settings">Settings</button>
            <button class="tab-btn" data-tab="tools">Tools</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Tab -->
            <div class="tab-content active" id="chat-tab">
                <div class="chat-container">
                    <div class="command-section">
                        <div class="input-row">
                            <input type="text" class="command-input" id="commandInput" placeholder="Enter command...">
                            <button class="input-btn voice" id="voiceBtn" title="Transcribe Tab Audio">🎤</button>
                            <button class="input-btn" id="sendBtn">➤</button>
                        </div>
                        <div class="tab-select-row">
                            <select class="tab-select" id="tabSelector">
                                <option value="">Select tab for audio capture...</option>
                            </select>
                            <button class="header-btn" id="refreshTabsBtn"
                                style="width:auto;padding:6px 10px;">🔄</button>
                        </div>
                    </div>
                    <div class="chat-messages" id="conversation">
                        <div class="message assistant">
                            <div>KELEDON v1.0: Real-time Orchestration</div>
                            <div class="message-time">Ready</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-content" id="history-tab">
                <div class="history-list" id="historyList">
                    <div style="padding:20px;text-align:center;color:var(--muted);">No history yet</div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-content" id="settings-tab">
                <div class="settings-scroll">
                    <div class="settings-group">
                        <label class="settings-label">Backend URL</label>
                        <input type="text" class="settings-input" id="backendUrl" value="http://localhost:3001">
                    </div>
                    <div class="settings-group">
                        <label class="settings-label">Agent Control</label>
                        <div class="toggle-row">
                            <div class="toggle-switch active" id="agentActiveToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <span>Agent Active</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tools Tab -->
            <div class="tab-content" id="tools-tab">
                <div class="tools-content">
                    <div
                        style="margin-bottom: 12px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase;">
                        Diagnostics & Utilities</div>
                    <div class="tool-chips">
                        <div class="tool-chip" id="testConnectionBtn">Ping Backend</div>
                        <div class="tool-chip" id="checkStatusBtn">Get Status</div>
                        <div class="tool-chip" id="testTTSBtn">Test TTS</div>
                        <div class="tool-chip" id="testSTTBtn">Test STT</div>
                        <div class="tool-chip" id="healthCheckBtn">Health Check</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- LED Status Bar -->
        <div class="led-bar">
            <div class="led-item">
                <div class="led gray" id="led-sw"
                    title="Service Worker: Chrome background runtime process responsible for socket connection, session lifecycle, and message routing.">
                </div>
                <span class="led-label">SW</span>
            </div>
            <div class="led-item">
                <div class="led gray" id="led-ws"
                    title="WebSocket: Connection status to the cloud orchestration brain."></div>
                <span class="led-label">WS</span>
            </div>
            <div class="led-item">
                <div class="led gray" id="led-stt" title="STT: Speech-to-text availability and provider connectivity.">
                </div>
                <span class="led-label">STT</span>
            </div>
            <div class="led-item">
                <div class="led gray" id="led-tts" title="TTS: Text-to-speech availability and local synthesis ready.">
                </div>
                <span class="led-label">TTS</span>
            </div>
            <div class="led-item">
                <div class="led gray" id="led-rtc" title="WebRTC: Audio capture status from active tab."></div>
                <span class="led-label">RTC</span>
            </div>
            <div class="led-item">
                <div class="led gray" id="led-agent" title="AG: Agent session state (connected + session active).">
                </div>
                <span class="led-label">AG</span>
            </div>
        </div>

        <!-- Log Panel -->
        <div class="log-panel" id="logPanel">
            <div class="log-header">
                <span>System Logs</span>
                <div class="log-actions">
                    <button class="log-btn" id="copyLogBtn">Copy</button>
                    <button class="log-btn" id="clearLogBtn">Clear</button>
                    <button class="log-btn" id="closeLogBtn">✕</button>
                </div>
            </div>
            <div class="log-content" id="logs-content"></div>
        </div>
    </div>

    <script src="../core/runtime-health.service.js"></script>
    <script src="sidepanel.js"></script>
</body>

</html>
