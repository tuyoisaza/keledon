<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELEDON Agent</title>
    <style>
        :root {
            --bg: #0f131a;
            --panel: #151c27;
            --panel-soft: #1b2432;
            --border: #2a374b;
            --text: #e6eef9;
            --muted: #94a3b8;
            --accent: #3bd3c6;
            --accent-strong: #1fb5aa;
            --danger: #f25c6c;
            --success: #38d39f;
            --warning: #fbbf24;
            --info: #60a5fa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 450px;
            min-height: 600px;
            margin: 0;
            font-family: "Space Grotesk", "DM Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Styles */
        .header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 16px;
        }

        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.3s ease;
        }

        .status-indicator.active {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .status-indicator.listening {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .version {
            font-size: 10px;
            color: var(--muted);
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            border-bottom: 2px solid transparent;
        }

        .tab-btn:hover {
            color: var(--text);
            background: var(--panel-soft);
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .tab-content.active {
            display: flex;
        }

        /* Command Input Section */
        .command-section {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .command-input {
            flex: 1;
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .command-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 211, 198, 0.1);
        }

        .input-btn {
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
        }

        .input-btn:hover {
            background: var(--accent-strong);
            transform: translateY(-1px);
        }

        .input-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .voice-btn {
            background: var(--danger);
        }

        .voice-btn.recording {
            background: var(--danger);
            animation: pulse 1s infinite;
        }

        /* Suggestions */
        .suggestions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .suggestion-chip {
            padding: 4px 8px;
            background: var(--panel-soft);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Content Areas */
        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .conversation {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
        }

        .message.user {
            background: var(--accent);
            color: white;
            align-self: flex-end;
        }

        .message.assistant {
            background: var(--panel);
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* History Panel */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            background: var(--panel-soft);
            border-color: var(--accent);
        }

        .history-command {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .history-time {
            font-size: 11px;
            color: var(--muted);
        }

        /* Settings Panel */
        .settings-group {
            margin-bottom: 20px;
        }

        .settings-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .settings-input,
        .settings-select {
            width: 100%;
            padding: 8px 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .settings-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-switch.active {
            background: var(--accent);
        }

        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle-switch.active .toggle-slider {
            transform: translateX(20px);
        }

        /* Tab Management */
        .tab-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tab-item {
            padding: 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-item:hover {
            background: var(--panel-soft);
            border-color: var(--accent);
        }

        .tab-item.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tab-favicon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        .tab-info {
            flex: 1;
            min-width: 0;
        }

        .tab-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-url {
            font-size: 11px;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 16px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
        }

        .status-dot.connected {
            background: var(--success);
        }

        .status-dot.connecting {
            background: var(--warning);
            animation: pulse 1s infinite;
        }

        .status-dot.ready {
            background: var(--success);
        }

        .status-dot.processing {
            background: var(--info);
            animation: pulse 1.5s infinite;
        }

        .status-dot.error {
            background: var(--danger);
        }

        .status-dot.degraded {
            background: var(--warning);
        }

        .component-status {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .component-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
        }

        .component-indicator span {
            opacity: 0.7;
        }

        .status-dot.speaking {
            background: var(--accent);
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* WebRTC specific styles */
        .webrtc-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--success);
            color: var(--bg);
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }

        .webrtc-injection-active {
            animation: pulse-green 2s ease-in-out infinite;
        }

        @keyframes pulse-green {
            0%, 100% { background: var(--success); }
            50% { background: var(--accent-strong); }
        }

        /* Error Messages */
        .error-message {
            padding: 12px;
            background: rgba(242, 92, 108, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            color: var(--danger);
            margin-bottom: 12px;
            font-size: 12px;
        }

        .success-message {
            padding: 12px;
            background: rgba(56, 211, 159, 0.1);
            border: 1px solid var(--success);
            border-radius: 8px;
            color: var(--success);
            margin-bottom: 12px;
            font-size: 12px;
        }

        /* Loading States */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--muted);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 400px) {
            body {
                width: 100%;
            }
            
            .header {
                padding: 12px;
            }
            
            .command-section {
                padding: 12px;
            }
            
            .content-area {
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <div class="brand">
                <div class="logo">K</div>
                <div>
                    <div style="font-weight: 600;">KELEDON</div>
                    <div class="version" id="version">v1.1.6</div>
                </div>
            </div>
            <div class="header-controls">
                <div class="status-indicator" id="statusIndicator"></div>
                <button class="input-btn" id="settingsBtn" title="Settings">⚙️</button>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="chat">💬 Chat</button>
            <button class="tab-btn" data-tab="tabs">📑 Tabs</button>
            <button class="tab-btn" data-tab="history">📜 History</button>
            <button class="tab-btn" data-tab="settings">⚙️ Settings</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Chat Tab -->
            <div class="tab-content active" id="chat-tab">
                <div class="command-section">
                    <div class="input-group">
                        <input type="text" class="command-input" id="commandInput" placeholder="Enter command or question...">
                        <button class="input-btn voice-btn" id="voiceBtn" title="Real Speech-to-Text">🎤</button>
                        <button class="input-btn" id="sendBtn" title="Send">➤</button>
                    </div>
                    <div class="suggestions" id="suggestions">
                        <div class="suggestion-chip" id="testConnectionBtn" style="background: var(--info); color: white;">Test Connection</div>
                        <div class="suggestion-chip" id="checkStatusBtn" style="background: var(--muted); color: white;">Check Status</div>
                        <div class="suggestion-chip" id="testTTSDryRun" style="background: var(--accent); color: white;">🔊 Test TTS</div>
                    </div>
                </div>
                <div class="content-area">
                    <div class="conversation" id="conversation">
                        <div class="message assistant">
                            <div>🔧 KELEDON Phase O/N-1: Basic functionality test</div>
                            <div class="message-time">Just now</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabs Tab -->
            <div class="tab-content" id="tabs-tab">
                <div class="content-area">
                    <div class="tab-list" id="tabList">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading tabs...
                        </div>
                    </div>
                </div>
            </div>

            <!-- History Tab -->
            <div class="tab-content" id="history-tab">
                <div class="content-area">
                    <div class="history-list" id="historyList">
                        <div class="loading">
                            <div class="spinner"></div>
                            Loading history...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-content" id="settings-tab">
                <div class="content-area">
                    <div class="settings-group">
                        <label class="settings-label">Language</label>
                        <select class="settings-select" id="languageSelect">
                            <option value="en">English</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="zh">Chinese</option>
                        </select>
                    </div>

                    <div class="settings-group">
                        <label class="settings-label">Voice Settings</label>
                        <div class="settings-toggle">
                            <div class="toggle-switch" id="voiceToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Enable voice commands</label>
                        </div>
                        <div class="settings-toggle">
                            <div class="toggle-switch active" id="autoListenToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Auto-listen on page load</label>
                        </div>
                    </div>

                    <div class="settings-group">
                        <label class="settings-label">AI Assistant</label>
                        <div class="settings-toggle">
                            <div class="toggle-switch active" id="smartSuggestionsToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Smart suggestions</label>
                        </div>
                        <div class="settings-toggle">
                            <div class="toggle-switch" id="contextAwareToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Context-aware assistance</label>
                        </div>
                    </div>

                    <div class="settings-group">
                        <label class="settings-label">Privacy</label>
                        <div class="settings-toggle">
                            <div class="toggle-switch active" id="saveHistoryToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Save command history</label>
                        </div>
                        <div class="settings-toggle">
                            <div class="toggle-switch" id="analyticsToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Share usage analytics</label>
                        </div>
                    </div>

                    <div class="settings-group">
                        <label class="settings-label">Agent Control</label>
                        <div class="settings-toggle">
                            <div class="toggle-switch active" id="agentActiveToggle">
                                <div class="toggle-slider"></div>
                            </div>
                            <label>Agent Active (Master Control)</label>
                        </div>
                    </div>

                    <div class="settings-group">
                        <label class="settings-label">Backend URL</label>
                        <input type="text" class="settings-input" id="backendUrl" value="" placeholder="Backend server URL" data-default="http://localhost:3001">
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot" id="connectionDot"></div>
                <span id="connectionStatus">Disconnected</span>
            </div>
            <div class="component-status">
                <div class="component-indicator">
                    <div class="status-dot" id="websocketStatus" title="WebSocket Connection"></div>
                    <span>WS</span>
                </div>
                <div class="component-indicator">
                    <div class="status-dot" id="sttStatus" title="Speech-to-Text"></div>
                    <span>STT</span>
                </div>
                <div class="component-indicator">
                    <div class="status-dot" id="ttsStatus" title="Text-to-Speech"></div>
                    <span>TTS</span>
                </div>
                <div class="component-indicator">
                    <div class="status-dot" id="webrtcStatus" title="WebRTC Audio Injection"></div>
                    <span>WebRTC</span>
                </div>
            </div>
            <div>
                <span id="sessionInfo">No active session</span>
            </div>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>
</html>
