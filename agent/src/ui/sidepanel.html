<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --bg: #0f131a;
            --panel: #151c27;
            --panel-soft: #1b2432;
            --border: #2a374b;
            --text: #e6eef9;
            --muted: #94a3b8;
            --accent: #3bd3c6;
            --accent-strong: #1fb5aa;
            --danger: #f25c6c;
            --success: #38d39f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 400px;
            margin: 0;
            font-family: "Space Grotesk", "DM Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: linear-gradient(135deg, #39d0c5, #5cb8ff);
            display: grid;
            place-items: center;
            font-weight: 700;
            color: #0b1118;
        }

        h3 {
            margin: 0;
            font-size: 18px;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        .status-pill {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            background: var(--panel-soft);
            border: 1px solid var(--border);
        }

        .status-pill.listening {
            background: rgba(56, 211, 159, 0.15);
            color: var(--success);
            border-color: rgba(56, 211, 159, 0.4);
        }

        .status-pill.error {
            background: rgba(242, 92, 108, 0.15);
            color: var(--danger);
            border-color: rgba(242, 92, 108, 0.4);
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 12px;
        }

        #listening-to {
            font-size: 12px;
            color: var(--muted);
        }

        #listening-to span {
            color: var(--text);
            font-weight: 600;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #transcript {
            height: 150px;
            overflow-y: auto;
            background: var(--panel-soft);
            border: 1px solid var(--border);
            padding: 10px;
            font-size: 12px;
            border-radius: 12px;
            white-space: pre-wrap;
        }

        #controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        #options {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
        }

        select,
        .checkbox-row {
            background: var(--panel-soft);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 8px 10px;
            font-size: 12px;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button {
            padding: 10px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            border: 1px solid transparent;
            font-size: 12px;
        }

        #btn-start {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #0b1118;
            border: none;
        }

        #btn-stop {
            background: rgba(242, 92, 108, 0.18);
            color: var(--danger);
            border: 1px solid rgba(242, 92, 108, 0.35);
        }

        #logs {
            width: 100%;
            height: 150px;
            font-size: 11px;
            background: #0b1118;
            color: #8de4ff;
            border: 1px solid #1f2a3a;
            resize: vertical;
            box-sizing: border-box;
            border-radius: 12px;
            padding: 8px;
        }

        #btn-copy-logs {
            margin-top: 8px;
            background: rgba(148, 163, 184, 0.12);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .partial {
            color: var(--muted);
            font-style: italic;
        }

        .final {
            color: var(--text);
            font-weight: 600;
            border-bottom: 1px dashed rgba(148, 163, 184, 0.3);
            padding-bottom: 2px;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="brand">
                <div class="logo">K</div>
                <div>
                    <h3>Keledon Agent</h3>
                    <div class="subtitle">Voice panel <span id="version">v...</span></div>
                </div>
            </div>
            <div id="status" class="status-pill">Ready</div>
        </div>

        <div id="listening-to" class="panel">
            <div>Listening to <span id="tab-title">-</span></div>
            <button id="btn-refresh-tab" type="button" style="margin-top: 8px;">Refresh Target Tab</button>
        </div>
        <div id="tab-tracking" class="panel">
            <div>Audio Tab: <span id="audio-tab">-</span></div>
            <div>RPA Tab: <span id="rpa-tab">-</span></div>
        </div>

        <div class="panel">
            <label>Live Transcript</label>
            <div id="transcript"></div>
        </div>

        <div id="options">
            <select id="language">
                <option value="en" selected>English (US)</option>
                <option value="es">Español</option>
            </select>
            <label class="checkbox-row">
                <input type="checkbox" id="debug-mode"> Debug
            </label>
        </div>

        <div id="controls">
            <button id="btn-start">Start Listening</button>
            <button id="btn-stop" disabled>Stop</button>
        </div>

        <div id="permission-hint" class="panel" style="display:none;">
            <label>Capture Permission</label>
            <div>Click the extension icon on the call tab to allow audio capture.</div>
        </div>

        <div class="panel">
            <label>🧠 Knowledge Base</label>
            <div class="knowledge-section">
                <input type="text" id="knowledge-query" placeholder="Search knowledge base..." style="width: 100%; margin-bottom: 8px; background: var(--panel-soft); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px; font-size: 12px;">
                <button id="btn-search-knowledge" style="width: 100%; background: var(--panel-soft); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px; font-size: 12px; cursor: pointer;">🔍 Search Knowledge</button>
                
                <div id="knowledge-results" style="margin-top: 12px; max-height: 200px; overflow-y: auto;">
                    <div style="color: var(--muted); font-size: 11px; text-align: center; padding: 20px;">Search knowledge base to see relevant information</div>
                </div>
                
                <!-- Feedback Section -->
                <div id="knowledge-feedback" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none;">
                    <label style="font-size: 11px; color: var(--muted); margin-bottom: 6px; display: block;">Was this helpful?</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px;">
                        <button id="btn-feedback-helpful" style="background: var(--success); color: var(--bg); border: none; border-radius: 6px; padding: 6px; font-size: 11px; cursor: pointer;">👍 Helpful</button>
                        <button id="btn-feedback-not-helpful" style="background: var(--danger); color: white; border: none; border-radius: 6px; padding: 6px; font-size: 11px; cursor: pointer;">👎 Not Helpful</button>
                    </div>
                    <textarea id="feedback-details" placeholder="Additional feedback (optional)..." style="width: 100%; min-height: 60px; background: var(--panel-soft); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px; font-size: 11px; resize: vertical; display: none;"></textarea>
                    <button id="btn-submit-feedback" style="width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 8px; font-size: 11px; cursor: pointer; display: none; margin-top: 6px;">Submit Feedback</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <label>Debug Logs</label>
            <textarea id="logs" readonly></textarea>
            <button id="btn-copy-logs">Copy Logs</button>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
