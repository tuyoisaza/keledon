version: '3.8'

services:
  # KELEDON Application (Development)
  keledon-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keledon-app-dev
    restart: unless-stopped
    ports:
      - "8080:8080"  # Cloud Run requirement
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3001  # Internal backend port
      - SINGLE_CONTAINER=true
      - DEBUG=keledon:*
    volumes:
      - .:/app:cached  # Mount source for development
      - /app/node_modules  # Prevent host node_modules conflicts
      - ./logs:/app/logs
    networks:
      - keledon-dev
    depends_on:
      - qdrant
      - redis
    command: npm run start:dev  # Use development start command
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: keledon-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=DEBUG
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - keledon-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis for session caching and real-time coordination
  redis:
    image: redis:7-alpine
    container_name: keledon-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - keledon-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - redis_data:/data

  # PostgreSQL with pgvector for development
  postgres:
    image: pgvector/pgvector:pg16
    container_name: keledon-postgres-dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=keledon_dev
      - POSTGRES_USER=keledon
      - POSTGRES_PASSWORD=keledon_dev_password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./cloud/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - keledon-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keledon -d keledon_dev"]
      interval: 30s
      timeout: 10s
      retries: 3
      start period: 40s

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local

networks:
  keledon-dev:
    driver: bridge